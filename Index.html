        if ('serviceWorker' in navigator) {
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL).catch(() => {
                // SW registration might fail with blob URL - that's okay
                console.log('Service Worker: Using fallback mode');
            });
        }

        // ========== PWA INSTALL PROMPT ==========
        let deferredPrompt = null;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');
        const closeBanner = document.getElementById('closeBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function showInstallBanner() {
            // Show banner if not installed as PWA
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                installBanner.classList.add('show');
            }
        }

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.classList.remove('show');
                }
                deferredPrompt = null;
            } else {
                // Fallback - show instructions
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if (isIOS) {
                    alert('📱 To install this app:\n\n1. Tap the Share button (📤)\n2. Tap "Add to Home Screen"\n3. Tap "Add"');
                } else {
                    alert('📱 To install this app:\n\n1. Tap the browser menu (⋮)\n2. Tap "Add to Home Screen"\n3. Tap "Add"');
                }
            }
        });

        closeBanner.addEventListener('click', () => {
            installBanner.classList.remove('show');
        });

        // Hide banner if already installed
        window.addEventListener('appinstalled', () => {
            installBanner.classList.remove('show');
            deferredPrompt = null;
        });
    </script>
</body>
</html>
